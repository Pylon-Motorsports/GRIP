name: validate

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  schemas:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install validator
        run: python -m pip install --upgrade jsonschema
      - name: Validate device-messaging examples
        run: python tools/validate_schemas.py
